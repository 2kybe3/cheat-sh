name: Lint

on: [push]

jobs:
  lint-and-build:
    runs-on: docker

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: https://github.com/cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: Build & Checks
        run: |
          nix flake check . -L --no-update-lock-file
